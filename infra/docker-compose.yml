version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: buscamedicos_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buscamedicos}
      POSTGRES_USER: ${POSTGRES_USER:-buscamedicos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buscamedicos123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buscamedicos} -d ${POSTGRES_DB:-buscamedicos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  backend_api:
    build:
      context: ../backend_api
      dockerfile: Dockerfile
    container_name: buscamedicos_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-buscamedicos}:${POSTGRES_PASSWORD:-buscamedicos123}@postgres:5432/${POSTGRES_DB:-buscamedicos}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-buscamedicos}
      REDIS_URL: ${REDIS_URL:-}
      FILES_PATH: /app/files
      MAX_FILE_SIZE_MB: 10
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend_api:/app
      - files_data:/app/files
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  backend_seed:
    build:
      context: ../backend_api
      dockerfile: Dockerfile
    container_name: buscamedicos_backend_seed
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-buscamedicos}:${POSTGRES_PASSWORD:-buscamedicos123}@postgres:5432/${POSTGRES_DB:-buscamedicos}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-buscamedicos}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && python -m scripts.seed"]
    volumes:
      - ../backend_api:/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  web_frontend:
    build:
      context: ../web_frontend
      dockerfile: Dockerfile.dev
    container_name: buscamedicos_web_frontend
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ../web_frontend:/app
      - web_frontend_node_modules:/app/node_modules
    depends_on:
      - backend_api
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


volumes:
  postgres_data:
  files_data:
  web_frontend_node_modules:
